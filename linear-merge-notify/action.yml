name: "Linear: comment on a merged PR's issue"
description: |
  On PR merge, comments on the Linear issue linked to the merged branch, @mentioning its
  assignee (e.g. "Merged & on staging"). Can optionally move the issue to a given state.

inputs:
  linear_client_id:
    description: "Linear OAuth app client ID (client-credentials grant)."
    required: true
  linear_client_secret:
    description: "Linear OAuth app client secret."
    required: true
  branch_name:
    description: "Merged PR head branch, used to find the Linear issue. Defaults to github.head_ref."
    required: false
    default: ""
  message:
    description: "Comment body; the assignee @mention is appended after ' — '."
    required: false
    default: "✅ Merged & on staging"
  target_state:
    description: "Optional Linear workflow state id to move the issue to. Omit to only comment. Skipped if the issue is already completed or canceled."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Comment on the merged PR's Linear issue
      shell: bash
      env:
        LINEAR_CLIENT_ID: ${{ inputs.linear_client_id }}
        LINEAR_CLIENT_SECRET: ${{ inputs.linear_client_secret }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
        BRANCH_NAME: ${{ inputs.branch_name != '' && inputs.branch_name || github.head_ref }}
        MESSAGE: ${{ inputs.message }}
        TARGET_STATE: ${{ inputs.target_state }}
      run: node "${{ github.action_path }}/notify.js"
