name: "Linear: comment on a merged PR's issue"
description: |
  On PR merge, comments on the Linear issue linked to the merged branch, @mentioning its
  assignee (e.g. "Merged & on staging").

inputs:
  linear_client_id:
    description: "Linear OAuth app client ID (client-credentials grant)."
    required: true
  linear_client_secret:
    description: "Linear OAuth app client secret."
    required: true
  branch_name:
    description: "Merged PR head branch, used to find the Linear issue."
    required: false
    default: ""
  pr_url:
    description: "Merged PR URL. Used to find the Linear issue via the PR attachment Linear's GitHub integration creates."
    required: false
    default: ""
  pr_title:
    description: "Merged PR title. A SEATS-### identifier in it is used as a fallback to find the issue."
    required: false
    default: ""
  message:
    description: "Comment body; the assignee @mention is appended after ' — '."
    required: false
    default: "✅ Merged & on staging"

runs:
  using: "composite"
  steps:
    - name: Comment on the merged PR's Linear issue
      shell: bash
      env:
        LINEAR_CLIENT_ID: ${{ inputs.linear_client_id }}
        LINEAR_CLIENT_SECRET: ${{ inputs.linear_client_secret }}
        PR_URL: ${{ inputs.pr_url }}
        PR_TITLE: ${{ inputs.pr_title }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        MESSAGE: ${{ inputs.message }}
      run: node "${{ github.action_path }}/notify.js"
